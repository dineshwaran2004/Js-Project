    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

</head>
<body>


<nav class="navbar">
    <ul class="list_itam">
        <li><a href="Form_Validation_App.html"> Basic ID Card</a></li>
        <li><a href="Digital_Clock.html"> Digital Clock</a></li>

    <button class="hamburger" id="hamburger" aria-label="Open menu">

</nav>


<div class="mobile-menu" id="mobileMenu">

    <img class="mainimg" src="IMG/JS MAIN.jpg" alt="JavaScript">

        </h1>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });
</script>

</body>
